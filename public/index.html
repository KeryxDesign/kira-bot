<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kira - Keryx Design Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #1a1a2e;
      --primary-light: #16213e;
      --accent: #e94560;
      --accent-light: #ff6b81;
      --bg: #f0f2f5;
      --white: #ffffff;
      --gray-100: #f8f9fa;
      --gray-200: #e9ecef;
      --gray-400: #ced4da;
      --gray-600: #6c757d;
      --gray-800: #343a40;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--primary);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
      z-index: 10;
    }

    .header-avatar {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .header-info p {
      font-size: 12px;
      opacity: 0.8;
    }

    .header-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.15);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Chat area */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.bot {
      background: var(--white);
      color: var(--gray-800);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .message.user {
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }

    .message.typing {
      background: var(--white);
      align-self: flex-start;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border-bottom-left-radius: 4px;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-dots span {
      width: 8px;
      height: 8px;
      background: var(--gray-400);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Input area */
    .input-area {
      padding: 16px 20px;
      background: var(--white);
      border-top: 1px solid var(--gray-200);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      border: 1px solid var(--gray-200);
      border-radius: 24px;
      padding: 12px 18px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }

    .input-area textarea:focus {
      border-color: var(--accent);
    }

    .input-area button {
      width: 46px;
      height: 46px;
      border: none;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .input-area button:hover { background: var(--accent-light); }
    .input-area button:active { transform: scale(0.95); }
    .input-area button:disabled { background: var(--gray-400); cursor: not-allowed; }

    /* Quick actions */
    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-self: flex-start;
      animation: fadeIn 0.25s ease;
    }

    .quick-btn {
      background: var(--white);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--accent);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .quick-btn:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Responsive */
    @media (min-width: 600px) {
      body {
        max-width: 480px;
        margin: 20px auto;
        height: calc(100dvh - 40px);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-avatar">K</div>
    <div class="header-info">
      <h1>Kira</h1>
      <p>Keryx Design Assistant</p>
    </div>
    <div class="header-badge">Online</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Scrivi il tuo messaggio..." autocomplete="off"></textarea>
    <button id="sendBtn" onclick="send()">&#10148;</button>
  </div>

<script>
const sessionId = crypto.randomUUID();
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// Enter to send (Shift+Enter for newline)
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

function showQuickActions() {
  const actions = [
    { label: 'DRD Cartaceo', msg: 'Mi interessa il Direct Response Design cartaceo' },
    { label: 'Libro per imprenditori', msg: 'Vorrei capire come funziona il servizio libri' },
    { label: 'Visual Hammer', msg: 'Cosa fate con il Visual Hammer?' },
    { label: 'Sito web / Landing page', msg: 'Ho bisogno di un sito o una landing page' },
    { label: 'Ads design', msg: 'Mi servono creativita per le ads' },
  ];
  const container = document.createElement('div');
  container.className = 'quick-actions';
  container.id = 'quickActions';
  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = a.label;
    btn.addEventListener('click', () => {
      container.remove();
      input.value = a.msg;
      send();
    });
    container.appendChild(btn);
  });
  chat.appendChild(container);
  chat.scrollTop = chat.scrollHeight;
}

function addMessage(text, sender) {
  const div = document.createElement('div');
  div.className = `message ${sender}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function addBotBubbles(text) {
  const paragraphs = text.split(/\n\n+/).filter(p => p.trim());
  for (let i = 0; i < paragraphs.length; i++) {
    if (i > 0) await new Promise(r => setTimeout(r, 400));
    addMessage(paragraphs[i].trim(), 'bot');
  }
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'message typing';
  div.id = 'typing';
  div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  // Remove quick actions if still present
  const qa = document.getElementById('quickActions');
  if (qa) qa.remove();

  addMessage(text, 'user');
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId })
    });

    hideTyping();

    if (!res.ok) throw new Error('API error');

    const data = await res.json();
    await addBotBubbles(data.reply);
  } catch (err) {
    hideTyping();
    addMessage("Mi dispiace, ho un problema di connessione. Riprova o scrivici direttamente a info@keryxdesign.com", 'bot');
  }

  sendBtn.disabled = false;
  input.focus();
}

// Welcome message + quick action buttons
addMessage("Ciao! Sono Kira, l'assistente di Keryx Design. Sono qui per capire cosa stai cercando, cosi Davide puo ricontattarti con le informazioni giuste. Ti faro qualche domanda e alla fine potrai rivedere un riepilogo prima che venga inviato. Che tipo di progetto hai in mente?", 'bot');
showQuickActions();
</script>

</body>
</html>
